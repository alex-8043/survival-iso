<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Survival Iso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <style>
      :root { --fg: #cdd6f4; --gold: #f5c96b; --panel: #1a2016; --line: #2c3626; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #12160f; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: var(--fg); }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* Menú */
      #menu { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: radial-gradient(1200px 700px at 50% 30%, #1f3320, #0c110b 70%); }
      .menu-card { text-align: center; padding: 26px 30px; max-height: 94vh; overflow: auto; }
      .menu-card.wide { width: min(720px, 94vw); }
      .menu-card h1 { margin: 0 0 4px; font-size: 46px; letter-spacing: 1px; }
      .menu-card h1 span { color: var(--gold); }
      .menu-card h2 { margin: 0 0 16px; }
      .menu-sub { margin: 0 0 22px; opacity: .8; }
      .menu-btns { display: flex; gap: 12px; justify-content: center; align-items: center; margin-top: 18px; flex-wrap: wrap; }
      .menu-btns.col { flex-direction: column; }
      .mbtn { background: rgba(255,255,255,.08); color: var(--fg); border: 1px solid var(--line); border-radius: 10px; font-size: 16px; padding: 11px 26px; cursor: pointer; min-width: 200px; transition: .12s; }
      .menu-btns.col .mbtn { min-width: 240px; }
      .mbtn:hover:not(:disabled) { background: rgba(255,255,255,.15); }
      .mbtn.primary { background: var(--gold); color: #201800; border-color: var(--gold); font-weight: 700; }
      .mbtn:disabled { opacity: .4; cursor: not-allowed; }
      .mbtn.arrow { min-width: 0; padding: 4px 12px; font-size: 20px; line-height: 1; }

      /* Personalización */
      .cust-row { display: flex; gap: 22px; align-items: flex-start; justify-content: center; }
      .cust-preview { background: rgba(0,0,0,.25); border: 1px solid var(--line); border-radius: 12px; padding: 8px; }
      .cust-ctrls { display: flex; flex-direction: column; gap: 8px; flex: 1; max-width: 440px; }
      .cat-row { display: flex; align-items: center; gap: 10px; }
      .cat-label { width: 96px; text-align: right; font-size: 13px; opacity: .85; }
      .cat-box { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
      .cat-val { min-width: 82px; font-size: 13px; }
      .sw { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; }
      .sw.sel { border-color: var(--gold); box-shadow: 0 0 0 1px #000 inset; }
      .opt-list { display: flex; flex-direction: column; gap: 10px; align-items: center; }

      /* HUD: vida+estamina a la izquierda de la hotbar, hambre+sed a la derecha */
      #hud-left, #hud-right { position: fixed; bottom: 16px; z-index: 22; display: flex; flex-direction: column; gap: 3px; }
      #hud-left { right: calc(50% + 248px); align-items: flex-end; }
      #hud-right { left: calc(50% + 248px); align-items: flex-start; }
      .hud-row { display: flex; gap: 2px; }
      .hud-ic { width: 20px; height: 20px; background-size: contain; background-repeat: no-repeat; background-position: center; }

      /* Feed de recolección (izquierda) */
      #pickup-feed { position: fixed; left: 12px; top: 46%; transform: translateY(-50%); z-index: 21; display: flex; flex-direction: column; gap: 5px; pointer-events: none; }
      .pf-row { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,.42); padding: 3px 10px 3px 5px; border-radius: 7px; font-size: 13px; font-weight: 600; opacity: 0; transform: translateX(-12px); transition: opacity .25s, transform .25s; }
      .pf-row.show { opacity: 1; transform: translateX(0); }
      .pf-ic { width: 22px; height: 22px; background-size: contain; background-repeat: no-repeat; background-position: center; }

      /* Minimapa */
      #minimap { position: fixed; left: 12px; top: 12px; z-index: 23; border: 2px solid rgba(0,0,0,.5); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.4); background: #0c110b; }
      #minimap-cv { display: block; width: 154px; height: 154px; image-rendering: pixelated; }
      #minimap-hint { position: absolute; right: 3px; bottom: 2px; font-size: 10px; color: #fff; opacity: .6; background: rgba(0,0,0,.4); padding: 0 4px; border-radius: 3px; }
      #bigmap { position: fixed; inset: 0; z-index: 58; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.72); }
      .bigmap-card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
      .bigmap-card h3 { margin: 0 0 10px; }
      #bigmap-cv { display: block; image-rendering: pixelated; border-radius: 6px; max-width: 86vw; max-height: 74vh; }
      #hud-clock { position: fixed; right: 12px; top: 12px; z-index: 20; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,.34); padding: 8px 12px; border-radius: 10px; font-size: 14px; }
      #clock-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 8px rgba(245,201,107,.6); }
      #clock-day { font-weight: 700; } #clock-time { opacity: .85; }

      /* Hotbar */
      #hotbar { position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%); z-index: 25; display: flex; gap: 6px; background: rgba(0,0,0,.4); padding: 6px; border-radius: 10px; }
      .hslot { position: relative; width: 46px; height: 46px; border-radius: 8px; background: rgba(255,255,255,.06); border: 2px solid transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; }
      .hslot.sel { border-color: var(--gold); background: rgba(245,201,107,.14); }
      .hicon { width: 24px; height: 24px; border-radius: 5px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.35); }
      .hkey { position: absolute; top: 2px; left: 4px; font-size: 10px; opacity: .55; }
      .hcount { position: absolute; bottom: 2px; right: 4px; font-size: 11px; font-weight: 700; color: var(--gold); }

      /* Panel de inventario */
      #panel { position: fixed; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.6); }
      .panel-card { position: relative; display: flex; gap: 18px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 20px; width: min(680px, 92vw); }
      .panel-close { position: absolute; right: 10px; top: 8px; background: transparent; border: 0; color: var(--fg); font-size: 22px; cursor: pointer; opacity: .7; }
      .panel-left { width: 200px; text-align: center; border-right: 1px solid var(--line); padding-right: 16px; }
      #panel-av { background: rgba(0,0,0,.2); border-radius: 10px; }
      .pstats { display: flex; flex-direction: column; gap: 7px; margin-top: 8px; }
      .pstat { display: flex; align-items: center; gap: 7px; font-size: 12px; }
      .pstat-l { width: 62px; text-align: left; opacity: .85; }
      .pbar { flex: 1; height: 9px; background: rgba(255,255,255,.12); border-radius: 5px; overflow: hidden; }
      .pbar div { height: 100%; }
      .panel-right { flex: 1; } .panel-right h3 { margin: 2px 0 12px; }
      .pslots { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
      .pslot { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.05); padding: 8px 10px; border-radius: 8px; }
      .pswatch { width: 16px; height: 16px; border-radius: 4px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.35); }
      .pname { flex: 1; font-size: 13px; } .pcount { font-weight: 700; color: var(--gold); }
      .pempty { opacity: .7; font-size: 13px; }

      /* Crafteo */
      #craft { position: fixed; inset: 0; z-index: 42; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.6); }
      .craft-card-wrap { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 22px; width: min(760px, 94vw); max-height: 88vh; overflow: auto; }
      .craft-card-wrap h3 { margin: 0 0 14px; }
      .craft-cat h4 { margin: 14px 0 8px; color: var(--gold); font-size: 14px; }
      .craft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
      .craft-card { background: rgba(255,255,255,.05); border: 1px solid var(--line); border-radius: 10px; padding: 10px; }
      .craft-name { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
      .craft-ing { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
      .ing { font-size: 11px; padding: 2px 6px; border-radius: 5px; background: rgba(255,255,255,.06); }
      .ing.ok { color: #a7e0a0; } .ing.no { color: #e79a9a; }
      .needs { font-size: 11px; opacity: .7; margin-bottom: 6px; }
      .craft-btn { width: 100%; background: var(--gold); color: #201800; border: 0; border-radius: 7px; padding: 6px; font-weight: 700; cursor: pointer; }
      .craft-btn:disabled { background: rgba(255,255,255,.1); color: rgba(255,255,255,.4); cursor: not-allowed; }

      /* Hotbar: icono de herramienta (sprite) y ranura vacía */
      .hicon.himg { background-color: transparent; background-repeat: no-repeat; background-position: center; background-size: 30px 30px; box-shadow: none; width: 30px; height: 30px; }
      .hslot.empty { opacity: .5; }

      /* Botón de ayuda / controles */
      #controls-btn { position: fixed; right: 12px; bottom: 14px; z-index: 26; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--line); background: rgba(0,0,0,.44); color: var(--fg); font-size: 18px; font-weight: 700; cursor: pointer; line-height: 1; }
      #controls-btn:hover { background: rgba(245,201,107,.22); border-color: var(--gold); }

      /* Overlay de controles */
      #controls { position: fixed; inset: 0; z-index: 44; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.62); }
      .ctrl-card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 22px; width: min(440px, 92vw); max-height: 88vh; overflow: auto; }
      .ctrl-card h3 { margin: 0 0 14px; }
      .ctrl-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
      .ctrl-row:last-child { border-bottom: 0; }
      .ctrl-act { font-size: 13px; opacity: .9; }
      .ctrl-key { font-size: 12px; font-weight: 700; color: var(--gold); background: rgba(245,201,107,.12); border: 1px solid var(--line); border-radius: 6px; padding: 3px 9px; white-space: nowrap; }

      /* Aviso de entrada/salida de cueva */
      #cave-hint { position: fixed; left: 50%; bottom: 150px; transform: translateX(-50%); z-index: 24; display: none; background: rgba(0,0,0,.6); color: var(--gold); font: 13px system-ui, sans-serif; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--line); pointer-events: none; }
      /* Fundido a negro al entrar/salir de la cueva */
      #cave-fade { position: fixed; inset: 0; z-index: 70; background: #000; display: none; pointer-events: none; }
      /* Pantalla de muerte */
      #death { position: fixed; inset: 0; z-index: 80; display: none; align-items: center; justify-content: center; background: rgba(28,4,4,.8); }
      .death-card { text-align: center; padding: 30px 40px; }
      .death-card h1 { font-size: 52px; margin: 0 0 8px; color: #e8534a; letter-spacing: 2px; text-shadow: 0 2px 14px rgba(0,0,0,.6); }
      .death-sub { opacity: .85; margin: 0 0 22px; }

      /* Menú de pausa */
      #pause { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.72); }
      .pause-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 22px 26px; width: min(360px, 92vw); max-height: 90vh; overflow: auto; text-align: center; }
      .pause-card.wide { width: min(460px, 94vw); }
      .pause-card h2 { margin: 0 0 16px; }
      .pause-btns { display: flex; flex-direction: column; gap: 10px; align-items: center; }
      .pause-btns.row { flex-direction: row; justify-content: center; margin-top: 14px; }
      .keybind-title { margin: 16px 0 8px; font-size: 13px; opacity: .8; text-align: left; }
      .keybind-list { display: flex; flex-direction: column; gap: 6px; }
      .kb-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .kb-act { font-size: 13px; opacity: .9; }
      .kb-key { min-width: 96px; font-size: 12px; font-weight: 700; color: var(--gold); background: rgba(245,201,107,.12); border: 1px solid var(--line); border-radius: 6px; padding: 5px 10px; cursor: pointer; }
      .kb-key:hover { background: rgba(245,201,107,.22); }
      .kb-key.listening { color: #fff; background: rgba(245,201,107,.32); }

      /* Inventario con ranuras + barra de acceso rápido */
      .inv-grid, .inv-bar { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
      .inv-bar-label { margin: 12px 0 5px; font-size: 12px; opacity: .7; }
      .islot { position: relative; aspect-ratio: 1; background: rgba(255,255,255,.05); border: 1px solid var(--line); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
      .inv-bar .islot { background: rgba(245,201,107,.08); border-color: rgba(245,201,107,.3); }
      .isprite { width: 84%; height: 84%; background-size: contain; background-repeat: no-repeat; background-position: center; }
      .icount { position: absolute; bottom: 0; right: 3px; font-size: 11px; font-weight: 700; color: var(--gold); text-shadow: 0 1px 2px #000; }
      .durbar { position: absolute; left: 3px; right: 3px; bottom: 2px; height: 3px; background: rgba(0,0,0,.55); border-radius: 2px; overflow: hidden; pointer-events: none; }
      .durbar > span { display: block; height: 100%; border-radius: 2px; }
      .armor-row { margin: 10px 0 4px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .armor-cells { display: flex; gap: 8px; }
      .armor-cells .islot { width: 46px; height: 46px; }
      .armor-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; opacity: .5; pointer-events: none; }
      .armor-def { font-size: 12px; opacity: .85; }
      .armor-def b { color: var(--gold); }

      /* Crafteo: cabecera, sprites de salida e ingredientes */
      .craft-title { display: flex; align-items: center; gap: 8px; }
      .craft-title-ic { width: 24px; height: 24px; background-size: contain; background-repeat: no-repeat; background-position: center; }
      .craft-head { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
      .craft-out { width: 26px; height: 26px; background-size: contain; background-repeat: no-repeat; background-position: center; }
      .ing { display: inline-flex; align-items: center; gap: 3px; }
      .ing-ic { width: 15px; height: 15px; background-size: contain; background-repeat: no-repeat; background-position: center; }
      .craft-empty { opacity: .7; font-size: 13px; }

      /* Arrastrar/ordenar ranuras + cofre */
      .inv-headrow { display: flex; align-items: center; justify-content: space-between; margin: 2px 0 10px; }
      .inv-headrow h3 { margin: 0; }
      .sort-btn { background: rgba(245,201,107,.16); color: var(--gold); border: 1px solid var(--line); border-radius: 7px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
      .sort-btn:hover { background: rgba(245,201,107,.28); }
      .islot { cursor: grab; touch-action: none; }
      .islot:active { cursor: grabbing; }
      .drag-ghost { position: fixed; width: 34px; height: 34px; margin-left: -17px; margin-top: -17px; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; z-index: 100000; filter: drop-shadow(0 3px 5px rgba(0,0,0,.5)); }

      /* Panel del cofre */
      #chest { position: fixed; inset: 0; z-index: 43; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.6); }
      .chest-card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 22px; width: min(520px, 94vw); max-height: 92vh; overflow: auto; }
      .chest-card h3 { margin: 0; }

      /* Panel del horno */
      #furnace { position: fixed; inset: 0; z-index: 43; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.6); }
      .furnace-card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 22px; width: min(520px, 94vw); max-height: 92vh; overflow: auto; }
      .furnace-card h3 { margin: 0 0 12px; }
      .furnace-machine { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 10px 0 4px; }
      .furnace-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      .furnace-col .islot { width: 50px; height: 50px; }
      .furnace-out .islot { width: 54px; height: 54px; }
      .furnace-flame { width: 20px; height: 26px; background: rgba(0,0,0,.4); border: 1px solid var(--line); border-radius: 4px; display: flex; align-items: flex-end; overflow: hidden; }
      .furnace-flame-fill { width: 100%; background: linear-gradient(#ffd24a, #ff6a1e); transition: height .2s linear; }
      .furnace-arrow { position: relative; width: 74px; height: 12px; background: rgba(0,0,0,.35); border-radius: 6px; overflow: hidden; }
      .furnace-arrow-fill { height: 100%; background: linear-gradient(90deg, #7ad14a, #b7f07a); transition: width .2s linear; }

      /* Menú contextual de ranura (comer / dividir) */
      #slot-menu { position: fixed; z-index: 100001; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 5px; display: flex; flex-direction: column; gap: 4px; min-width: 132px; box-shadow: 0 4px 14px rgba(0,0,0,.5); }
      #slot-menu button { background: rgba(255,255,255,.06); color: var(--fg); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer; text-align: left; }
      #slot-menu button:hover { background: rgba(245,201,107,.18); }
      #slot-menu .sm-split { display: flex; gap: 4px; }
      #slot-menu .sm-split input { width: 52px; background: rgba(0,0,0,.3); color: var(--fg); border: 1px solid var(--line); border-radius: 6px; padding: 5px; font-size: 13px; }
      #slot-menu .sm-split button { flex: 1; text-align: center; }

      /* Diálogo del aldeano (comercio + misión) */
      #village { position: fixed; inset: 0; z-index: 45; display: none; align-items: center; justify-content: center; background: rgba(6,10,6,.6); }
      .village-card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 22px; width: min(620px, 94vw); max-height: 90vh; overflow: auto; }
      .village-head { display: flex; align-items: center; justify-content: space-between; margin: 0 0 12px; padding-right: 26px; }
      .village-head h3 { margin: 0; }
      .village-coins { display: inline-flex; align-items: center; gap: 5px; font-weight: 700; color: var(--gold); font-size: 15px; }
      .vcoin { display: inline-block; width: 15px; height: 15px; background-size: contain; background-repeat: no-repeat; background-position: center; vertical-align: middle; }
      .vsec { margin-bottom: 12px; }
      .vsec h4 { margin: 6px 0 8px; color: var(--gold); font-size: 13px; }
      .vcols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .vquest { display: flex; align-items: center; gap: 12px; background: rgba(245,201,107,.08); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
      .vq-txt { flex: 1; font-size: 13px; }
      .vq-sub { opacity: .8; font-size: 12px; margin-top: 3px; display: flex; align-items: center; gap: 4px; }
      .vrow { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
      .vrow:last-child { border-bottom: 0; }
      .vrow-ic { width: 22px; height: 22px; background-size: contain; background-repeat: no-repeat; background-position: center; flex-shrink: 0; }
      .vrow-name { flex: 1; font-size: 13px; }
      .vrow-have { font-size: 11px; opacity: .7; }
      .vbtn { display: inline-flex; align-items: center; gap: 4px; background: var(--gold); color: #201800; border: 0; border-radius: 7px; padding: 6px 11px; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; }
      .vbtn.sm { padding: 4px 9px; }
      .vbtn:disabled { background: rgba(255,255,255,.1); color: rgba(255,255,255,.4); cursor: not-allowed; }
      .vbtn .vcoin { width: 13px; height: 13px; }
      .vempty { opacity: .7; font-size: 12px; padding: 6px 0; }
      @media (max-width: 560px) { .vcols { grid-template-columns: 1fr; } }

      /* ============================================================
         ESTILO MINECRAFT — inventario, crafteo, cofre, comercio y hotbar
         Biseles 3D duros, esquinas rectas, gris piedra y fuente pixel.
         (Sólo afecta a esos paneles; el resto del juego no cambia.)
         ============================================================ */
      :root { --mc-face:#c6c6c6; --mc-hi:#fefefe; --mc-lo:#565656; --mc-ink:#2b2b2b;
              --mc-slot:#8b8b8b; --mc-slot-lo:#373737; --mc-green:#5fa040; }

      /* Marcos de panel: gris piedra con bisel 3D y borde negro. */
      #panel .panel-card, #craft .craft-card-wrap, #chest .chest-card, #village .village-card {
        background: var(--mc-face); border: 0; border-radius: 0; color: var(--mc-ink);
        font-family: 'VT323', monospace; font-size: 19px; line-height: 1.15;
        box-shadow: inset 3px 3px 0 var(--mc-hi), inset -3px -3px 0 var(--mc-lo),
                    0 0 0 3px #1b1b1b, 0 7px 0 3px rgba(0,0,0,.35);
      }
      #panel .panel-card *, #craft .craft-card-wrap *, #chest .chest-card *,
      #village .village-card * { border-radius: 0 !important; }
      #panel .panel-left { border-right: 3px solid var(--mc-lo); }
      #panel .pstat-l, #panel .pname, #panel .pempty, #chest .vrow-name,
      #village .vrow-name, #village .vrow-have, #village .vq-txt,
      #craft .needs, #craft .craft-name, #craft .craft-empty { color: var(--mc-ink); }
      #panel .panel-close, #craft .panel-close, #chest .panel-close, #village .panel-close { color: #1b1b1b; opacity: .85; }

      /* Títulos y etiquetas: fuente pixel con sombra dura. */
      #panel h3, #craft h3, #chest h3, #village h3,
      #panel .inv-bar-label, #craft .craft-title {
        font-family: 'Press Start 2P', monospace; font-size: 12px; line-height: 1.5;
        color: #3a2e10; text-shadow: 1px 1px 0 rgba(255,255,255,.4);
      }
      #craft .craft-cat h4, #village .vsec h4 {
        font-family: 'Press Start 2P', monospace; font-size: 10px; line-height: 1.5;
        color: #2f6b1f; text-shadow: 1px 1px 0 rgba(255,255,255,.35);
      }

      /* Ranuras: hueco "hundido" gris (bisel invertido). */
      #panel .islot, #chest .islot, #panel .pslot, #hotbar .hslot {
        background: var(--mc-slot) !important; border: 0 !important;
        box-shadow: inset 2px 2px 0 var(--mc-slot-lo), inset -2px -2px 0 var(--mc-hi);
      }
      #panel .inv-bar .islot { background: #7c7c7c !important; }
      #panel .icount, #chest .icount, #panel .pcount, #hotbar .hcount { color: #fff; text-shadow: 1px 1px 0 #000; }
      .isprite, .hicon, .craft-out, .ing-ic, .vrow-ic, .pswatch, .craft-title-ic { image-rendering: pixelated; }

      /* Hotbar: barra de piedra clásica con selección blanca. */
      #hotbar { background: var(--mc-face); border-radius: 0; padding: 4px;
        box-shadow: inset 2px 2px 0 var(--mc-hi), inset -2px -2px 0 var(--mc-lo), 0 0 0 3px #1b1b1b; }
      #hotbar .hslot { border-radius: 0; }
      #hotbar .hslot.sel { background: #9c9c9c !important;
        box-shadow: 0 0 0 3px #fff, inset 2px 2px 0 var(--mc-slot-lo), inset -2px -2px 0 var(--mc-hi); }
      #hotbar .hkey { color: #f4f4f4; opacity: .9; text-shadow: 1px 1px 0 #000; }

      /* Botones con bisel (verde = acción). */
      #craft .craft-btn, #village .vbtn, .inv-headrow .sort-btn {
        font-family: 'Press Start 2P', monospace; font-size: 9px; line-height: 1.6;
        border: 0; border-radius: 0; color: #eafbe0; background: var(--mc-green);
        text-shadow: 1px 1px 0 #29511a;
        box-shadow: inset 2px 2px 0 #8fd06a, inset -2px -2px 0 #356b22, 0 0 0 2px #1b1b1b;
      }
      #craft .craft-btn:hover:not(:disabled), #village .vbtn:hover:not(:disabled),
      .inv-headrow .sort-btn:hover { background: #6cb54a; }
      #craft .craft-btn:disabled, #village .vbtn:disabled {
        background: #9a9a9a; color: #d9d9d9; text-shadow: none;
        box-shadow: inset 2px 2px 0 #b8b8b8, inset -2px -2px 0 #6f6f6f, 0 0 0 2px #1b1b1b; }

      /* Tarjetas de receta e ingredientes sobre gris. */
      #craft .craft-card { background: #b2b2b2; border: 0;
        box-shadow: inset 2px 2px 0 var(--mc-hi), inset -2px -2px 0 var(--mc-lo); color: var(--mc-ink); }
      #craft .ing { background: #9d9d9d; color: #232; }
      #craft .ing.ok { color: #1c5a12; } #craft .ing.no { color: #8a1f1f; }
      #panel .pslot, #panel .pbar { background: #a6a6a6 !important; }
      #panel .pbar { box-shadow: inset 2px 2px 0 var(--mc-slot-lo); }
      #village .vquest { background: #b8b8b8; border: 0;
        box-shadow: inset 2px 2px 0 var(--mc-hi), inset -2px -2px 0 var(--mc-lo); }
      #village .vrow { border-bottom-color: rgba(0,0,0,.18); }
      #village .village-coins, #village .vsec .vcoin { filter: none; }
      #village .village-coins { color: #6b4e12; }
    </style>
  </head>
